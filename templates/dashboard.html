{% extends "index.html" %}
{% block content %}
<div class="dashboard-container">
  <h1>Connectify Dashboard</h1>
  <section class="kpi-cards">
    <div class="kpi-card" id="total-emails"><h3>Total Emails</h3><p>0</p></div>
    <div class="kpi-card" id="emails-sent"><h3>Emails Sent</h3><p>0</p></div>
    <div class="kpi-card" id="emails-pending"><h3>Pending Emails</h3><p>0</p></div>
    <div class="kpi-card" id="added-today"><h3>Added Today</h3><p>0</p></div>
  </section>
  <section class="charts">
    <canvas id="status-pie" width="400" height="200"></canvas>
    <canvas id="keyword-bar" width="600" height="300"></canvas>
    <canvas id="daily-line" width="600" height="300"></canvas>
  </section>
  <section class="tables">
    <h2>Keyword Analysis</h2>
    <table id="keyword-table" class="data-table">
      <thead><tr><th>Keyword</th><th>Count</th></tr></thead>
      <tbody></tbody>
    </table>
    <h2>Pending Queue</h2>
    <table id="pending-table" class="data-table">
      <thead><tr><th>Email</th><th>Keyword</th><th>Timestamp</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/dashboard.js"></script>
{% endblock %}
